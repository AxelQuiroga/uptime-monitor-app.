<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uptime Monitor — Login</title>
    <style>
        :root {
            --bg-primary: #0f172a; --bg-card: #1e293b; --bg-input: #0f172a;
            --border: #334155; --text: #e2e8f0; --text-sec: #94a3b8; --text-muted: #64748b;
            --cyan: #38bdf8; --red: #ef4444; --radius: 12px; --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            line-height: 1.5; padding: 1rem;
        }
        .login-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 360px;
        }
        .login-card h1 {
            font-size: 1.25rem; font-weight: 700; text-align: center;
            margin-bottom: 0.25rem; letter-spacing: -0.02em;
        }
        .login-card p.sub {
            font-size: 0.8rem; color: var(--text-muted); text-align: center;
            margin-bottom: 1.5rem;
        }
        .login-card .field {
            display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1rem;
        }
        .login-card .field label {
            font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .login-card .field input {
            background: var(--bg-input); border: 1px solid var(--border);
            color: var(--text); padding: 0.6rem 0.75rem; border-radius: 6px;
            font-size: 0.9rem; width: 100%;
        }
        .login-card .field input:focus {
            outline: none; border-color: var(--cyan);
        }
        .login-card button {
            width: 100%; background: var(--cyan); border: none; color: #0f172a;
            padding: 0.65rem; border-radius: 6px; font-weight: 600; font-size: 0.9rem;
            cursor: pointer; transition: opacity 0.15s;
        }
        .login-card button:hover { opacity: 0.9; }
        .login-card .error {
            background: rgba(239, 68, 68, 0.15); color: var(--red);
            font-size: 0.8rem; padding: 0.5rem 0.75rem; border-radius: 6px;
            margin-bottom: 1rem; text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Uptime Monitor</h1>
        <p class="sub">Enter the admin password to continue</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('auth.login_post') }}">
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" autofocus required />
            </div>
            <button type="submit">Sign in</button>
        </form>
    </div>
</body>
</html>
